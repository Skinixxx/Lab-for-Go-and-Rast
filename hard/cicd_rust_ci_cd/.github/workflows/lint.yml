# ============================================
# Lint Workflow — проверка синтаксиса workflow-файлов
# ============================================
name: Lint Workflows

# ============================================
# Триггеры — запуск только при изменениях workflow-файлов
# ============================================
on:
  # При пуше в основные ветки, если изменились workflow-файлы
  push:
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  # При PR, если изменились workflow-файлы
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  # Ручной запуск
  workflow_dispatch:

# ============================================
# Задачи (jobs)
# ============================================
jobs:
  # --------------------------------------------
  # Job 1: Проверка синтаксиса GitHub Actions
  # --------------------------------------------
  actionlint:
    runs-on: ubuntu-latest
    steps:
      # Клонирование репозитория
      - uses: actions/checkout@v4

      # Запуск actionlint через готовый action
      # raven-actions/actionlint автоматически устанавливает
      # actionlint и добавляет его в PATH — без ручного скачивания
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  # --------------------------------------------
  # Job 2: Проверка YAML-синтаксиса
  # --------------------------------------------
  yamllint:
    runs-on: ubuntu-latest
    steps:
      # Клонирование репозитория
      - uses: actions/checkout@v4

      # Установка yamllint через pip
      # yamllint проверяет отступы, переносы строк, синтаксис YAML
      - name: Install yamllint
        run: pip install yamllint

      # Запуск yamllint на все workflow-файлы
      - name: Run yamllint
        run: yamllint .github/workflows/
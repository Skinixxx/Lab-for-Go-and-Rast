version: '3.8'

services:
  go-service:
    build:
      context: .
      dockerfile: Dockerfile.go
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - HTTP_PORT=8080
    networks:
      - integration-net

  python-client:
    build:
      context: .
      dockerfile: Dockerfile.python
    depends_on:
      - go-service
    environment:
      - HTTP_HOST=go-service:8080
      - GRPC_HOST=go-service:50051
    networks:
      - integration-net

networks:
  integration-net:
    driver: bridge

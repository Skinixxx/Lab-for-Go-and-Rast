name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install base dependencies
        run: pacman -Sy --noconfirm python python-pip rust cargo git

      - uses: actions/checkout@v4

      - name: Install maturin and pytest
        run: pip install maturin pytest --break-system-packages

      - name: Build and install
        run: |
          cd hard/cicd_rust_ci_cd
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 maturin build --release --out dist
          pip install dist/*.whl --break-system-packages --force-reinstall

      - name: Run tests
        run: |
          cd hard/cicd_rust_ci_cd
          pytest tests/ -v

  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            python: "3.12"
          - os: ubuntu-latest
            target: aarch64
            python: "3.12"
          - os: windows-latest
            target: x64
            python: "3.12"
          - os: macos-latest
            target: x86_64
            python: "3.12"
          - os: macos-latest
            target: aarch64
            python: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python${{ matrix.python }}
          sccache: "true"
          working-directory: hard/cicd_rust_ci_cd

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: hard/cicd_rust_ci_cd/dist
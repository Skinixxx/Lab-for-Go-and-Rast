# ============================================
# Release Workflow — публикация на PyPI
# ============================================
name: Release

# ============================================
# Триггеры
# ============================================
on:
  # При пуше тега формата v* (например, v0.1.0, v1.2.3)
  push:
    tags:
      - 'v*'
  # Ручной запуск через GitHub UI
  workflow_dispatch:
    inputs:
      # Флаг для публикации только на TestPyPI
      test_only:
        description: 'Publish to TestPyPI only'
        required: false
        default: 'false'

# Права доступа
permissions:
  contents: write

# ============================================
# Задачи (jobs)
# ============================================
jobs:
  # --------------------------------------------
  # Job 1: Сборка wheels
  # --------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      # Клонирование репозитория
      - uses: actions/checkout@v4

      # Установка Python 3.12 (фиксируем версию чтобы избежать проблем с 3.14)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Установка maturin напрямую без Docker
      - name: Install maturin
        run: pip install maturin

      # Сборка wheel-пакетов напрямую без manylinux Docker контейнера
      # PYO3_USE_ABI3_FORWARD_COMPATIBILITY нужен для совместимости с Python 3.14+
      - name: Build wheels
        run: |
          cd hard/cicd_rust_ci_cd
          maturin build --release --out dist
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      # Загрузка артефактов для следующих job'ов
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: hard/cicd_rust_ci_cd/dist

  # --------------------------------------------
  # Job 2: Публикация на TestPyPI
  # --------------------------------------------
  test-publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    # Запускается только после успешного build
    needs: build
    steps:
      # Скачивание артефактов из job 'build'
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      # Публикация на TestPyPI
      # --skip-existing = не падать если версия уже есть
      - name: Publish to TestPyPI
        uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --repository testpypi --skip-existing
        env:
          # Токен хранится в GitHub → Settings → Secrets → PYPI_TEST_API_TOKEN
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TEST_API_TOKEN }}

  # --------------------------------------------
  # Job 3: Публикация на PyPI (продакшн)
  # --------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Запускается только после успешного test-publish
    needs: test-publish
    # Только при пуше тега, не при ручном запуске с test_only=true
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      github.event.inputs.test_only != 'true'
    steps:
      # Скачивание артефактов
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      # Публикация на основной PyPI
      # --skip-existing = пропустить если версия уже опубликована
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --skip-existing
        env:
          # Токен хранится в GitHub → Settings → Secrets → PYPI_API_TOKEN
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

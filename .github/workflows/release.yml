# ============================================
# Release Workflow — публикация на PyPI
# ============================================

# Название workflow
name: Release

# ============================================
# Триггеры
# ============================================
on:
  # При пуше тега формата v* (например, v0.1.0, v1.2.3)
  push:
    tags:
      - 'v*'
  # Ручной запуск через GitHub UI
  # позволяет публиковать только на TestPyPI без тега
  workflow_dispatch:
    inputs:
      # Флаг для публикации только на TestPyPI
      test_only:
        description: 'Publish to TestPyPI only'
        required: false
        default: 'false'

# Права доступа
permissions:
  # Запись содержимого нужно для создания релизов/артефактов
  contents: write

# ============================================
# Задачи (jobs)
# ============================================
jobs:
  # --------------------------------------------
  # Job 1: Сборка wheels (общий для всех)
  # --------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      # Клонирование репозитория
      - uses: actions/checkout@v6

      # Сборка wheel-пакетов
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          # Параметры сборки
          args: --release --out dist
          # manylinux: auto = совместимость со всеми Linux-дистрибутивами
          # (автоматически выбирает подходящий manylinux образ)
          manylinux: auto
          working-directory: hard/cicd_rust_ci_cd

      # Загрузка артефактов (wheels) для следующих job'ов
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          # Имя артефакта (одинаковое для всех)
          name: wheels
          # Папка с собранными wheels
          path: dist

  # --------------------------------------------
  # Job 2: Публикация на TestPyPI
  # --------------------------------------------
  test-publish:
    # Имя job (видно в GitHub UI)
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    # Запускается только после успешного завершения job 'build'
    needs: build
    steps:
      # Скачивание артефактов из job 'build'
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist

      # Публикация на TestPyPI (тестовый реестр PyPI)
      - name: Publish to TestPyPI
        uses: PyO3/maturin-action@v1
        with:
          # Команда publish = публикация пакета
          command: publish
          # --repository testpypi = использовать TestPyPI вместо PyPI
          # --skip-existing = не падать если версия уже есть
          args: --repository testpypi --skip-existing
        env:
          # Токен для авторизации на TestPyPI
          # Хранится в GitHub → Settings → Secrets
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TEST_API_TOKEN }}

  # --------------------------------------------
  # Job 3: Публикация на PyPI (продакшн)
  # --------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Запускается только после успешного test-publish
    needs: test-publish
    # Условие: только при пуше тега (не ручной запуск с test_only=true)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.inputs.test_only != 'true'
    steps:
      # Скачивание артефактов
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist

      # Публикация на PyPI (продакшн)
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: publish
          # Без --repository = публикация на основной PyPI
          # --skip-existing = пропустить если версия уже опубликована
          args: --skip-existing
        env:
          # Токен для PyPI (отличается от TestPyPI!)
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
